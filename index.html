<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港幣兌台幣</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 13px;
            background: #fff;
            color: #333;
        }

        .container {
            padding: 0;
        }

        .toolbar {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            gap: 8px;
        }

        .dropdown {
            display: flex;
            align-items: center;
            background: #2d8a8a;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .dropdown::after {
            content: '▼';
            margin-left: 8px;
            font-size: 10px;
        }

        .toolbar-icon {
            background: #2d8a8a;
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .column-headers {
            display: grid;
            grid-template-columns: 100px 120px 150px 120px 120px 80px 120px 120px 100px 100px 100px 100px;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
            color: #666;
            text-align: center;
            padding: 4px 0;
        }

        .column-headers span {
            padding: 4px;
            border-right: 1px solid #e0e0e0;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1000px;
        }

        thead th {
            background: #f8f9fa;
            padding: 10px 8px;
            text-align: left;
            border-bottom: 2px solid #e0e0e0;
            font-weight: 500;
            position: sticky;
            top: 0;
            white-space: nowrap;
        }

        thead th .icon {
            margin-right: 4px;
            opacity: 0.6;
        }

        tbody tr {
            border-bottom: 1px solid #eee;
        }

        tbody tr:nth-child(odd) {
            background: rgba(45, 138, 138, 0.08);
        }

        tbody tr:nth-child(even) {
            background: #fff;
        }

        tbody tr:hover {
            background: rgba(45, 138, 138, 0.15);
        }

        td {
            padding: 10px 8px;
            vertical-align: middle;
        }

        td[contenteditable="true"] {
            cursor: text;
        }

        td[contenteditable="true"]:focus {
            outline: 2px solid #2d8a8a;
            outline-offset: -2px;
            background: #fff;
        }

        td[contenteditable="true"]:hover {
            background: rgba(45, 138, 138, 0.1);
        }

        .month-cell {
            background: rgba(45, 138, 138, 0.2);
            border-radius: 4px;
            padding: 4px 12px;
            display: inline-block;
        }

        .date-cell {
            color: #333;
        }

        .date-cell.placeholder {
            color: #999;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            margin: 1px 2px;
            font-size: 12px;
        }

        .tag-red {
            background: #fce4e4;
            color: #c53030;
            border: 1px solid #feb2b2;
        }

        .tag-yellow {
            background: #fefcbf;
            color: #975a16;
            border: 1px solid #f6e05e;
        }

        .tag-green {
            background: #c6f6d5;
            color: #276749;
            border: 1px solid #9ae6b4;
        }

        .type-tag {
            background: #bee3f8;
            color: #2b6cb0;
            border: 1px solid #90cdf4;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .placeholder-bar {
            background: rgba(45, 138, 138, 0.15);
            height: 24px;
            border-radius: 4px;
            min-width: 60px;
        }

        .amount-cell {
            text-align: right;
            font-family: 'SF Mono', Monaco, monospace;
        }

        .summary-row {
            background: #e8e4f0 !important;
            font-weight: 600;
        }

        .summary-row td {
            padding: 12px 8px;
        }

        .footer {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            gap: 12px;
        }

        .add-btn {
            color: #2d8a8a;
            font-weight: 500;
            cursor: pointer;
        }

        .import-btn {
            background: #2d8a8a;
            color: white;
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .import-btn:hover {
            background: #247070;
        }

        #fileInput {
            display: none;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state p {
            margin-bottom: 16px;
        }

        .row-count {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .row-count input {
            width: 60px;
            padding: 4px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .col-letter {
            text-align: center;
            font-size: 11px;
            color: #999;
            padding: 4px 0;
            background: #f5f5f5;
            border-bottom: 1px solid #e0e0e0;
        }

        .header-row {
            display: grid;
            grid-template-columns: 100px 120px 150px 120px 120px 80px 120px 120px 100px 100px 100px 100px;
        }

        .refresh-btn {
            background: #4a90d9;
            color: white;
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .refresh-btn:hover {
            background: #3a7bc8;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="toolbar">
            <div class="dropdown">港幣兌台幣</div>
            <div class="toolbar-icon">▦</div>
            <button class="refresh-btn" onclick="loadFromGoogleSheet()">從 Google Sheet 載入</button>
            <input type="file" id="fileInput" accept=".csv">
            <button class="import-btn" onclick="document.getElementById('fileInput').click()">匯入 CSV</button>
        </div>

        <div class="header-row col-letter">
            <span>A</span>
            <span>B</span>
            <span>C</span>
            <span>D</span>
            <span>E</span>
            <span>F</span>
            <span>G</span>
            <span>H</span>
            <span>I</span>
            <span>J</span>
            <span>K</span>
            <span>L</span>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th><span class="icon">◉</span>月份</th>
                        <th><span class="icon">📅</span>交易日期</th>
                        <th><span class="icon">◉</span>經手人</th>
                        <th><span class="icon">◉</span>類型</th>
                        <th><span class="icon">💰</span>港幣金額</th>
                        <th><span class="icon">#</span>匯率</th>
                        <th><span class="icon">💰</span>台幣金額</th>
                        <th><span class="icon">💰</span>可轉帳額度</th>
                        <th><span class="icon">◉</span>台幣餘額</th>
                        <th><span class="icon">💰</span>港幣餘額</th>
                        <th><span class="icon">◉</span>戶名</th>
                        <th><span class="icon">#</span>帳戶後四碼</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>

        <div class="footer">
            <span class="add-btn" onclick="addEmptyRow()">新增</span>
            <div class="row-count">
                <input type="text" value="1000">
                <span>列於底部</span>
            </div>
        </div>
    </div>

    <script>
        function parseCSV(csv) {
            const lines = csv.trim().split('\n');
            const headers = parseCSVLine(lines[0]);
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                const values = parseCSVLine(lines[i]);
                const row = {};
                headers.forEach((header, idx) => {
                    row[header] = values[idx] || '';
                });
                data.push(row);
            }
            return data;
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;

            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                if (char === '"') {
                    inQuotes = !inQuotes;
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function getHandlerTags(handlers) {
            if (!handlers) return '<div class="placeholder-bar"></div>';

            const names = handlers.split(',').map(n => n.trim());
            const colors = ['tag-red', 'tag-yellow', 'tag-green'];

            return names.map((name, idx) =>
                `<span class="tag ${colors[idx % colors.length]}">${name}</span>`
            ).join('');
        }

        function getTypeTag(type) {
            if (!type) return '<div class="placeholder-bar"></div>';
            return `<span class="type-tag">${type}</span>`;
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            let html = '';

            const lastRow = data[data.length - 1];
            const isLastRowSummary = !lastRow['月份'] && lastRow['台幣金額'];
            const dataRows = isLastRowSummary ? data.slice(0, -1) : data;

            dataRows.forEach((row, idx) => {
                const hasDate = row['交易日期'] && row['交易日期'].trim();
                const hasMonth = row['月份'] && row['月份'].trim();

                html += `<tr>
                    <td contenteditable="true">${hasMonth ? row['月份'] : ''}</td>
                    <td contenteditable="true" class="date-cell ${!hasDate ? 'placeholder' : ''}">${hasDate ? row['交易日期'] : ''}</td>
                    <td contenteditable="true">${row['經手人'] || ''}</td>
                    <td contenteditable="true">${row['類型'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${row['港幣金額'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${row['匯率'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${row['台幣金額'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${row['可轉帳額度'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${row['台幣餘額'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${row['港幣餘額'] || ''}</td>
                    <td contenteditable="true">${row['戶名'] || ''}</td>
                    <td contenteditable="true">${row['帳戶後四碼'] || ''}</td>
                </tr>`;
            });

            if (isLastRowSummary) {
                html += `<tr class="summary-row">
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true"></td>
                    <td contenteditable="true" class="amount-cell">${lastRow['匯率'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${lastRow['台幣金額'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${lastRow['可轉帳額度'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${lastRow['台幣餘額'] || ''}</td>
                    <td contenteditable="true" class="amount-cell">${lastRow['港幣餘額'] || ''}</td>
                    <td contenteditable="true">${lastRow['戶名'] || ''}</td>
                    <td contenteditable="true">${lastRow['帳戶後四碼'] || ''}</td>
                </tr>`;
            }

            tbody.innerHTML = html;
        }

        function showEmptyState() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = `
                <tr>
                    <td colspan="12" class="empty-state">
                        <p>尚未載入資料</p>
                        <button class="refresh-btn" onclick="loadFromGoogleSheet()">從 Google Sheet 載入</button>
                        <button class="import-btn" onclick="document.getElementById('fileInput').click()" style="margin-left: 8px;">匯入 CSV 檔案</button>
                        <button class="import-btn" onclick="addEmptyRow()" style="margin-left: 8px;">新增一列</button>
                    </td>
                </tr>
            `;
        }

        function addEmptyRow() {
            const tbody = document.getElementById('tableBody');
            // Clear empty state if present
            const emptyState = tbody.querySelector('.empty-state');
            if (emptyState) {
                tbody.innerHTML = '';
            }

            const newRow = document.createElement('tr');
            newRow.innerHTML = `
                <td contenteditable="true"></td>
                <td contenteditable="true" class="date-cell"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true" class="amount-cell"></td>
                <td contenteditable="true" class="amount-cell"></td>
                <td contenteditable="true" class="amount-cell"></td>
                <td contenteditable="true" class="amount-cell"></td>
                <td contenteditable="true" class="amount-cell"></td>
                <td contenteditable="true" class="amount-cell"></td>
                <td contenteditable="true"></td>
                <td contenteditable="true"></td>
            `;
            tbody.appendChild(newRow);
        }

        const GOOGLE_SHEET_ID = '186OiYOtO3psJNWaQ4v4bpFPJmaxdiwKGbXdCW-0pfVs';
        const GOOGLE_SHEET_GID = '0';

        async function loadFromGoogleSheet() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '<tr><td colspan="12" class="loading">載入中...</td></tr>';

            const url = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=csv&gid=${GOOGLE_SHEET_GID}`;

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error('無法載入 Google Sheet');
                }
                const csvContent = await response.text();
                const data = parseCSV(csvContent);
                renderTable(data);
            } catch (error) {
                console.error('Error loading Google Sheet:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="12" class="empty-state">
                            <p>載入失敗: ${error.message}</p>
                            <p style="font-size: 12px; color: #999; margin-top: 8px;">請確認 Google Sheet 已設為「知道連結的任何人都可以檢視」</p>
                            <button class="refresh-btn" onclick="loadFromGoogleSheet()" style="margin-top: 12px;">重試</button>
                        </td>
                    </tr>
                `;
            }
        }

        // Handle file upload
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const csvContent = event.target.result;
                const data = parseCSV(csvContent);
                renderTable(data);
            };
            reader.readAsText(file, 'UTF-8');
        });

        // Auto-load from Google Sheet on page load
        loadFromGoogleSheet();
    </script>
</body>
</html>
